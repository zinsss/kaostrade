project:
  name: KaosTrade

paths:
  data: /app/data
  logs: /app/logs
  models: /app/models

database:
  path: /app/data/kaostrade.sqlite

collector:
  interval_sec: 30
  candle_intervals:
    - 1m
    - 5m
    - 15m
  static_whitelist:
    - KRW-BTC
    - KRW-ETH
    - KRW-XRP
    - KRW-SOL
    - KRW-DOGE
